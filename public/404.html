<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>404 — Page Not Found</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: ui-monospace, "Space Mono", monospace;
      background: #0d1117;
      color: #f4efe8;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: clamp(3rem, 10vw, 6rem); color: #f97352; margin-bottom: 1rem; }
    p { color: #b3bcc8; margin-bottom: 2rem; line-height: 1.7; }
    a {
      display: inline-block;
      padding: 0.9rem 1.5rem;
      border: 1px solid rgba(249, 115, 82, 0.4);
      border-radius: 999px;
      color: #f4efe8;
      text-decoration: none;
      transition: 0.25s ease;
    }
    a:hover { background: rgba(249, 115, 82, 0.08); transform: translateY(-2px); }
  </style>
</head>

<body>
  <main>
    <h1>404</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/">Return home</a>
  </main>
</body>

</html>
